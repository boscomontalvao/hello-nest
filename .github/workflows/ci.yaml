name: Lint and SonarQube Analysis

on: [pull_request]

jobs:
  code-analysis:
    name: Lint and SonarQube 
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies  
        run: npm ci

      - name: Generate ESLint report
        run: npm run lint:report

      - name: Upload ESLint report
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.json

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v5.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Wait for Quality Gate status
        uses: sonarsource/sonarqube-quality-gate-action@v1.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      
      - name: Notify on Quality Gate Failure
        # Condição: Executa SOMENTE se o passo 'sonarqube-quality-gate-check' FALHOU
        if: ${{ always() && steps.sonarqube-quality-gate-check.outcome == 'failure' }}
        run: |
          echo "::error::🚨 The SonarQube Quality Gate failed! Your code needs review to meet quality standards."


